version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: content-repurposer-db
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: content_repurposer
    ports:
      - "5432:5432"
    volumes:
      - content_repurposer_pg:/var/lib/postgresql/data

volumes:
  content_repurposer_pg:
